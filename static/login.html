<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Darija AI</title>
  <meta name="description" content="Sign in or create your Darija AI account to start learning Moroccan Arabic." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Google Identity Services (for OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ── Reset & Base ──────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brand: #c1440e;
      --brand-dark: #a33a0c;
      --brand-glow: rgba(193, 68, 14, 0.35);
      --ok: #22c55e;
      --ok-bg: rgba(34, 197, 94, 0.12);
      --ok-border: rgba(34, 197, 94, 0.35);
      --err: #ef4444;
      --err-bg: rgba(239, 68, 68, 0.12);
      --err-border: rgba(239, 68, 68, 0.35);
      --warn: #f59e0b;
      --surface: rgba(255, 255, 255, 0.035);
      --border: rgba(255, 255, 255, 0.09);
      --muted: #6b7280;
      --text: #f3f4f6;
      --card-w: 460px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #07070e;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── Animated background ──────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 520px;
      height: 520px;
      background: #c1440e;
      top: -140px;
      left: -160px;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      bottom: -120px;
      right: -120px;
      animation-duration: 18s;
      animation-delay: -6s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: #0ea5e9;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      animation-duration: 22s;
      animation-delay: -10s;
      opacity: 0.1;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    /* ── Card ──────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(13, 13, 22, 0.72);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: var(--card-w);
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 32px 80px rgba(0, 0, 0, 0.55);
    }

    /* ── Logo ──────────────────────────────────────── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--brand);
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.83rem;
      margin-bottom: 32px;
      font-weight: 400;
    }

    /* ── Tabs ──────────────────────────────────────── */
    .tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      border-radius: 10px;
      transition: all 0.22s ease;
      user-select: none;
    }

    .tab.active {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 2px 14px var(--brand-glow);
    }

    /* ── Google Button ─────────────────────────────── */
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      color: #e8eaf6;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.01em;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 24px rgba(66, 133, 244, 0.15);
      transform: translateY(-1px);
    }

    .google-btn:active {
      transform: translateY(0);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Divider ───────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      font-size: 0.75rem;
      color: #4b5563;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    /* ── Forms ─────────────────────────────────────── */
    .form {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .form.active {
      display: flex;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 13px 42px 13px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--brand);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }

    input::placeholder {
      color: #374151;
    }

    input.valid {
      border-color: var(--ok) !important;
    }

    input.invalid {
      border-color: var(--err) !important;
    }

    input:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    /* Status icon inside input */
    .input-status-icon {
      position: absolute;
      right: 13px;
      font-size: 1rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .input-status-icon.show {
      opacity: 1;
    }

    /* ── Field hint ─────────────────────────────────── */
    .field-hint {
      font-size: 0.73rem;
      min-height: 1em;
      font-weight: 500;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .field-hint.ok {
      color: var(--ok);
    }

    .field-hint.err {
      color: var(--err);
    }

    /* ── Email verification spinner ─────────────────── */
    .email-checking {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.73rem;
      color: #60a5fa;
      font-weight: 500;
      margin-top: 4px;
    }

    .email-checking.show {
      display: flex;
    }

    .spin {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(96, 165, 250, 0.25);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Password strength meter ────────────────────── */
    .strength-meter {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .strength-bar-row {
      display: flex;
      gap: 4px;
    }

    .strength-seg {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.35s ease;
    }

    .strength-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
      transition: color 0.3s;
    }

    .strength-rules {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 10px;
      margin-top: 2px;
    }

    .rule {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }

    .rule.pass {
      color: var(--ok);
    }

    .rule-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    /* ── Submit button ──────────────────────────────── */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 6px;
      box-shadow: 0 4px 20px var(--brand-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover {
      background: var(--brand-dark);
      box-shadow: 0 4px 32px rgba(193, 68, 14, 0.55);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      background: #1f2937;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
      color: #4b5563;
    }

    /* Loading spinner inside button */
    .btn-spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    .btn-spin.show {
      display: block;
    }

    /* ── Message Banners ───────────────────────────── */
    .banner {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.84rem;
      font-weight: 600;
      display: none;
      line-height: 1.45;
    }

    .banner.show {
      display: block;
    }

    .banner.err-banner {
      color: #fca5a5;
      background: var(--err-bg);
      border: 1px solid var(--err-border);
      animation: shake 0.4s ease;
    }

    .banner.ok-banner {
      color: #86efac;
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-6px);
      }

      40% {
        transform: translateX(6px);
      }

      60% {
        transform: translateX(-4px);
      }

      80% {
        transform: translateX(4px);
      }
    }

    /* ── Google Button (overlay technique) ─────────── */
    .google-btn-outer {
      position: relative;
      width: 100%;
      height: 50px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      cursor: pointer;
    }

    /* Rainbow top accent */
    .google-btn-outer::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #4285F4 0%, #34A853 33%, #FBBC05 66%, #EA4335 100%);
      opacity: 0.55;
      transition: opacity 0.25s ease;
      z-index: 1;
    }

    .google-btn-outer:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(66, 133, 244, 0.45);
      box-shadow: 0 0 32px rgba(66, 133, 244, 0.15), 0 4px 20px rgba(0,0,0,0.3);
    }

    .google-btn-outer:hover::before { opacity: 1; }

    /* Visual label layer — purely decorative, passes clicks through to GIS overlay */
    .google-btn-visual {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;  /* clicks fall through to the GIS iframe below */
      z-index: 2;
      color: #e8eaed;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .google-btn-visual svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Invisible GIS-rendered button sits on top — receives the real clicks */
    #gis-btn-target {
      position: absolute;
      inset: 0;
      opacity: 0.001;
      overflow: hidden;
      z-index: 3;
    }

    /* Force GIS button to fill the container */
    #gis-btn-target > div {
      width: 100% !important;
      height: 100% !important;
    }

    #gis-btn-target iframe {
      width: 100% !important;
      height: 100% !important;
      transform: scale(1.5);
      transform-origin: center center;
    }

    /* ── Guest button ───────────────────────────────── */
    .guest-btn {
      width: 100%;
      padding: 13px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.22);
      border-radius: 14px;
      color: var(--ok);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .guest-btn:hover {
      background: rgba(34, 197, 94, 0.15);
      border-color: var(--ok);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
      transform: translateY(-1px);
    }

    .guest-btn:active {
      transform: translateY(0);
    }

    /* ── Back link ──────────────────────────────────── */
    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.8rem;
      color: #374151;
    }

    .back-link a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--brand);
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 520px) {
      .card {
        padding: 36px 22px 30px;
        margin: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-layer">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="card">
    <!-- Logo -->
    <div class="logo-row">
      <span class="logo-icon">🇲🇦</span>
      <div class="logo-text">Darija<span>AI</span></div>
    </div>
    <div class="tagline">Your Moroccan language companion</div>

    <!-- GIS initialized via JS API for reliable custom-button support -->
    <!-- g_id_onload removed: we call google.accounts.id.initialize() in JS below -->

    <!-- Overlay button: visual layer + invisible real GIS button on top -->
    <div class="google-btn-outer" id="google-btn-outer">
      <!-- Visual layer (pointer-events: none — decorative only) -->
      <div class="google-btn-visual" id="google-btn-visual">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="google-btn-text">Se connecter avec Google</span>
        <span class="btn-spin" id="google-spin"></span>
      </div>
      <!-- GIS renders its real button here — invisible but clickable (z-index above visual) -->
      <div id="gis-btn-target"></div>
    </div>
    <div class="banner err-banner" id="google-error" style="margin-top:10px;"></div>

    <div class="divider">or sign in manually</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- ── Login Form ────────────────────────────────── -->
    <div class="form active" id="login-form">
      <!-- Email -->
      <div class="field-group">
        <label for="login-email">Email Address</label>
        <div class="input-wrap">
          <input type="text" id="login-email" placeholder="you@example.com" autocomplete="email"
            oninput="validateLoginEmail()" onblur="validateLoginEmail()" />
          <span class="input-status-icon" id="login-email-icon"></span>
        </div>
        <div class="field-hint" id="login-email-hint"></div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="login-pass">Password</label>
        <div class="input-wrap">
          <input type="password" id="login-pass" placeholder="Your password" autocomplete="current-password" disabled
            oninput="validateLoginPass()" onblur="validateLoginPass()" />
          <span class="input-status-icon" id="login-pass-icon"></span>
        </div>
        <div class="field-hint" id="login-pass-hint"></div>
      </div>

      <div class="banner err-banner" id="login-error"></div>
      <div class="banner ok-banner" id="login-success"></div>

      <button class="submit-btn" id="login-btn" onclick="doLogin()" disabled>
        <span class="btn-spin" id="login-spin"></span>
        <span id="login-btn-text">Sign In →</span>
      </button>
    </div>

    <!-- ── Register Form ─────────────────────────────── -->
    <div class="form" id="register-form">
      <!-- Name -->
      <div class="field-group">
        <label for="reg-name">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="reg-name" placeholder="Your full name" autocomplete="name"
            oninput="validateRegName()" />
          <span class="input-status-icon" id="reg-name-icon"></span>
        </div>
        <div class="field-hint" id="reg-name-hint"></div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="reg-email">Email Address</label>
        <div class="input-wrap">
          <input type="text" id="reg-email" placeholder="you@example.com" autocomplete="email"
            oninput="onRegEmailInput()" onblur="checkEmailFull()" />
          <span class="input-status-icon" id="reg-email-icon"></span>
        </div>
        <div class="email-checking" id="reg-email-checking">
          <div class="spin"></div>
          <span>Verifying email domain…</span>
        </div>
        <div class="field-hint" id="reg-email-hint"></div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="reg-pass">Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-pass" placeholder="Create a strong password" autocomplete="new-password"
            disabled oninput="validateRegPass()" />
        </div>

        <!-- Strength meter -->
        <div class="strength-meter" id="strength-meter" style="display:none;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="strength-bar-row" style="flex:1; margin-right:10px;">
              <div class="strength-seg" id="seg-1"></div>
              <div class="strength-seg" id="seg-2"></div>
              <div class="strength-seg" id="seg-3"></div>
              <div class="strength-seg" id="seg-4"></div>
            </div>
            <div class="strength-label" id="strength-label">—</div>
          </div>

          <div class="strength-rules">
            <div class="rule" id="rule-length">
              <div class="rule-dot"></div>8+ characters
            </div>
            <div class="rule" id="rule-upper">
              <div class="rule-dot"></div>Uppercase (A-Z)
            </div>
            <div class="rule" id="rule-lower">
              <div class="rule-dot"></div>Lowercase (a-z)
            </div>
            <div class="rule" id="rule-digit">
              <div class="rule-dot"></div>Number (0-9)
            </div>
            <div class="rule" id="rule-symbol">
              <div class="rule-dot"></div>Symbol (!@#$…)
            </div>
          </div>
        </div>

        <div class="field-hint" id="reg-pass-hint"></div>
      </div>

      <div class="banner err-banner" id="reg-error"></div>
      <div class="banner ok-banner" id="reg-success"></div>

      <button class="submit-btn" id="reg-btn" onclick="doRegister()" disabled>
        <span class="btn-spin" id="reg-spin"></span>
        <span id="reg-btn-text">Create Account →</span>
      </button>
    </div>

    <!-- Guest -->
    <div class="divider" style="margin-top:20px;">or</div>
    <button class="guest-btn" id="guest-btn" onclick="doGuest()">🚀 Continue as Guest</button>

    <div class="back-link"><a href="/">← Back to home</a></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // CONSTANTS & STATE
    // ═══════════════════════════════════════════════════════════════════════
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Replace with your actual Google Client ID after setup
    const GOOGLE_CLIENT_ID = "935433610664-79n4rltgadp0khrhteg2tj2mu0g0i7ni.apps.googleusercontent.com";

    let regEmailValid = false;  // true only after server MX check passes
    let regEmailChecking = false;
    let regEmailDebounce = null;
    let regPassValid = false;
    let regNameValid = false;

    // ═══════════════════════════════════════════════════════════════════════
    // INPUT SANITIZATION
    // ═══════════════════════════════════════════════════════════════════════
    function sanitizeInput(str) {
      // Remove HTML tags, dangerous chars, and common injection patterns
      return str
        .replace(/<[^>]*>/g, '')
        .replace(/[<>"'`;]/g, '')
        .replace(/(--|\/\*|\*\/|DROP\s+TABLE|SELECT\s+\*|INSERT\s+INTO|DELETE\s+FROM|UNION\s+SELECT)/gi, '')
        .trim();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // FIELD STATE HELPERS
    // ═══════════════════════════════════════════════════════════════════════
    function setField(inputId, hintId, iconId, ok, msg) {
      const inp = document.getElementById(inputId);
      const hint = document.getElementById(hintId);
      const icon = iconId ? document.getElementById(iconId) : null;

      inp.classList.toggle('valid', ok && msg !== '');
      inp.classList.toggle('invalid', !ok && msg !== '');

      if (hint) {
        hint.textContent = msg;
        hint.className = 'field-hint' + (msg === '' ? '' : ok ? ' ok' : ' err');
      }

      if (icon) {
        icon.textContent = msg === '' ? '' : ok ? '✓' : '✗';
        icon.style.color = ok ? 'var(--ok)' : 'var(--err)';
        icon.classList.toggle('show', msg !== '');
      }
    }

    function showBanner(id, msg, isErr = true) {
      const el = document.getElementById(id);
      el.textContent = (isErr ? '⚠ ' : '✓ ') + msg;
      el.className = `banner show ${isErr ? 'err-banner' : 'ok-banner'}`;
    }

    function hideBanner(id) {
      document.getElementById(id).classList.remove('show');
    }

    function setBtnLoading(textId, spinId, loading, label) {
      document.getElementById(textId).textContent = loading ? '' : label;
      document.getElementById(spinId).classList.toggle('show', loading);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TAB SWITCH
    // ═══════════════════════════════════════════════════════════════════════
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').classList.toggle('active', tab === 'login');
      document.getElementById('register-form').classList.toggle('active', tab === 'register');
    }

    // ═══════════════════════════════════════════════════════════════════════
    // GOOGLE OAUTH — overlay technique
    // ═══════════════════════════════════════════════════════════════════════

    // Initialize GIS via JS API and render real button into invisible overlay
    function initGoogleSignIn() {
      if (typeof google === 'undefined' || !google.accounts) {
        setTimeout(initGoogleSignIn, 200);
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback:  handleGoogleCredential,
        ux_mode:   'popup',
        auto_select: false
      });
      // Render the real GIS button into the invisible overlay div
      google.accounts.id.renderButton(
        document.getElementById('gis-btn-target'),
        { type: 'standard', size: 'large', width: 460, theme: 'filled_black' }
      );
    }
    initGoogleSignIn();

    // Called automatically by GIS library after user picks account
    async function handleGoogleCredential(response) {
      const btnText   = document.getElementById('google-btn-text');
      const btnSpin   = document.getElementById('google-spin');
      const errBanner = document.getElementById('google-error');

      // Show verifying state on the visual label
      if (btnText) btnText.textContent = '⏳ Verifying…';
      if (btnSpin) btnSpin.classList.add('show');
      errBanner.textContent = '';
      errBanner.className   = 'banner';

      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (res.ok) {
          if (btnText) btnText.textContent = '✓ Welcome, ' + data.name + '!';
          if (btnSpin) btnSpin.classList.remove('show');
          errBanner.textContent = '✓ Redirecting…';
          errBanner.className   = 'banner show ok-banner';
          setTimeout(() => window.location.href = '/menu', 900);
        } else {
          if (btnText) btnText.textContent = 'Se connecter avec Google';
          if (btnSpin) btnSpin.classList.remove('show');
          showBanner('google-error', data.error || 'Google sign-in failed.', true);
        }
      } catch (e) {
        if (btnText) btnText.textContent = 'Se connecter avec Google';
        if (btnSpin) btnSpin.classList.remove('show');
        showBanner('google-error', 'Connection error. Please try again.', true);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // LOGIN VALIDATION
    // ═══════════════════════════════════════════════════════════════════════
    function validateLoginEmail() {
      const val = sanitizeInput(document.getElementById('login-email').value);
      const passEl = document.getElementById('login-pass');

      if (val === '') {
        setField('login-email', 'login-email-hint', 'login-email-icon', false, '');
        passEl.disabled = true; passEl.value = '';
        document.getElementById('login-btn').disabled = true;
        return false;
      }
      if (!EMAIL_RE.test(val)) {
        setField('login-email', 'login-email-hint', 'login-email-icon', false, 'Please enter a valid email address');
        passEl.disabled = true; passEl.value = '';
        document.getElementById('login-btn').disabled = true;
        return false;
      }
      setField('login-email', 'login-email-hint', 'login-email-icon', true, 'Looks good');
      passEl.disabled = false;
      validateLoginPass();
      return true;
    }

    function validateLoginPass() {
      const val = document.getElementById('login-pass').value;
      const btn = document.getElementById('login-btn');

      if (val.length === 0) {
        setField('login-pass', 'login-pass-hint', 'login-pass-icon', false, '');
        btn.disabled = true;
        return false;
      }
      if (val.length < 5) {
        setField('login-pass', 'login-pass-hint', 'login-pass-icon', false, `Password too short (${val.length}/5)`);
        btn.disabled = true;
        return false;
      }
      setField('login-pass', 'login-pass-hint', 'login-pass-icon', true, 'Password OK');
      btn.disabled = !EMAIL_RE.test(sanitizeInput(document.getElementById('login-email').value));
      return true;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // REGISTER VALIDATION — NAME
    // ═══════════════════════════════════════════════════════════════════════
    function validateRegName() {
      const raw = sanitizeInput(document.getElementById('reg-name').value);
      if (raw.length === 0) {
        setField('reg-name', 'reg-name-hint', 'reg-name-icon', false, '');
        regNameValid = false;
        return;
      }
      if (raw.length < 2) {
        setField('reg-name', 'reg-name-hint', 'reg-name-icon', false, 'Name must be at least 2 characters');
        regNameValid = false;
        return;
      }
      setField('reg-name', 'reg-name-hint', 'reg-name-icon', true, 'Name looks good');
      regNameValid = true;
      updateRegBtn();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // REGISTER VALIDATION — EMAIL (with real-time MX check)
    // ═══════════════════════════════════════════════════════════════════════
    function onRegEmailInput() {
      // Reset MX valid state on new input
      regEmailValid = false;
      document.getElementById('reg-pass').disabled = true;
      document.getElementById('reg-pass').value = '';
      document.getElementById('reg-btn').disabled = true;
      document.getElementById('strength-meter').style.display = 'none';
      document.getElementById('reg-pass-hint').textContent = '';

      const val = sanitizeInput(document.getElementById('reg-email').value);

      if (!EMAIL_RE.test(val)) {
        setField('reg-email', 'reg-email-hint', 'reg-email-icon', false,
          val.length > 0 ? 'Enter a valid email address' : '');
        return;
      }

      // Clear any previous completion, debounce the full check
      clearTimeout(regEmailDebounce);
      regEmailDebounce = setTimeout(() => checkEmailFull(), 800);
    }

    async function checkEmailFull() {
      const val = sanitizeInput(document.getElementById('reg-email').value);
      if (!EMAIL_RE.test(val)) return;

      // Show spinner
      document.getElementById('reg-email-checking').classList.add('show');
      setField('reg-email', 'reg-email-hint', 'reg-email-icon', true, '');
      regEmailChecking = true;

      try {
        const res = await fetch('/api/validate-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: val })
        });
        const data = await res.json();

        document.getElementById('reg-email-checking').classList.remove('show');
        regEmailChecking = false;

        if (data.valid) {
          setField('reg-email', 'reg-email-hint', 'reg-email-icon', true, '✓ Email verified — domain is live');
          regEmailValid = true;
          document.getElementById('reg-pass').disabled = false;
          validateRegPass();
        } else {
          setField('reg-email', 'reg-email-hint', 'reg-email-icon', false, data.reason || 'Email not accepted');
          regEmailValid = false;
          document.getElementById('reg-pass').disabled = true;
        }
      } catch (e) {
        document.getElementById('reg-email-checking').classList.remove('show');
        regEmailChecking = false;
        setField('reg-email', 'reg-email-hint', 'reg-email-icon', false, 'Could not verify email — check your connection');
        regEmailValid = false;
      }

      updateRegBtn();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // REGISTER VALIDATION — PASSWORD STRENGTH METER
    // ═══════════════════════════════════════════════════════════════════════
    const RULES = [
      { id: 'rule-length', re: /.{8,}/, label: '8+ chars' },
      { id: 'rule-upper', re: /[A-Z]/, label: 'Uppercase' },
      { id: 'rule-lower', re: /[a-z]/, label: 'Lowercase' },
      { id: 'rule-digit', re: /\d/, label: 'Number' },
      { id: 'rule-symbol', re: /[!@#$%^&*()\-_=+\[\]{}|;:',.<>?/\\`~"]+/, label: 'Symbol' },
    ];

    const STRENGTH_COLORS = ['#ef4444', '#f59e0b', '#eab308', '#22c55e'];
    const STRENGTH_LABELS = ['Weak', 'Fair', 'Strong', 'Very Strong'];

    function validateRegPass() {
      const val = document.getElementById('reg-pass').value;
      const meter = document.getElementById('strength-meter');

      if (val.length === 0) {
        meter.style.display = 'none';
        setField('reg-pass', 'reg-pass-hint', null, false, '');
        regPassValid = false;
        updateRegBtn();
        return;
      }

      meter.style.display = 'flex';

      // Evaluate rules
      let passed = 0;
      RULES.forEach(r => {
        const ok = r.re.test(val);
        if (ok) passed++;
        const el = document.getElementById(r.id);
        el.classList.toggle('pass', ok);
      });

      // Color segments (1–4)
      const segs = [1, 2, 3, 4];
      segs.forEach(i => {
        const seg = document.getElementById(`seg-${i}`);
        seg.style.background = i <= passed ? STRENGTH_COLORS[passed - 1] : 'rgba(255,255,255,0.08)';
      });

      const label = document.getElementById('strength-label');
      label.textContent = STRENGTH_LABELS[passed - 1] || '—';
      label.style.color = passed > 0 ? STRENGTH_COLORS[passed - 1] : 'var(--muted)';

      regPassValid = passed === 5;

      if (regPassValid) {
        setField('reg-pass', 'reg-pass-hint', null, true, '✓ Password meets all requirements');
      } else {
        setField('reg-pass', 'reg-pass-hint', null, false, '');
      }

      updateRegBtn();
    }

    function updateRegBtn() {
      document.getElementById('reg-btn').disabled = !(regNameValid && regEmailValid && regPassValid);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // API CALLS
    // ═══════════════════════════════════════════════════════════════════════
    async function doLogin() {
      if (!validateLoginEmail() || !validateLoginPass()) return;

      const email = sanitizeInput(document.getElementById('login-email').value.trim().toLowerCase());
      const password = document.getElementById('login-pass').value;
      const btn = document.getElementById('login-btn');

      hideBanner('login-error');
      hideBanner('login-success');
      btn.disabled = true;
      setBtnLoading('login-btn-text', 'login-spin', true, 'Sign In →');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          showBanner('login-success', `Welcome back, ${data.name}! Redirecting…`, false);
          setBtnLoading('login-btn-text', 'login-spin', false, 'Sign In →');
          setTimeout(() => window.location.href = '/menu', 900);
        } else {
          showBanner('login-error', data.error || 'Login failed. Please check your credentials.', true);
          btn.disabled = false;
          setBtnLoading('login-btn-text', 'login-spin', false, 'Sign In →');
        }
      } catch (e) {
        showBanner('login-error', 'Connection error. Please try again.', true);
        btn.disabled = false;
        setBtnLoading('login-btn-text', 'login-spin', false, 'Sign In →');
      }
    }

    async function doRegister() {
      if (!regNameValid || !regEmailValid || !regPassValid) return;

      const name = sanitizeInput(document.getElementById('reg-name').value.trim());
      const email = sanitizeInput(document.getElementById('reg-email').value.trim().toLowerCase());
      const password = document.getElementById('reg-pass').value;
      const btn = document.getElementById('reg-btn');

      hideBanner('reg-error');
      hideBanner('reg-success');
      btn.disabled = true;
      setBtnLoading('reg-btn-text', 'reg-spin', true, 'Create Account →');

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (res.ok) {
          showBanner('reg-success', `Account created! Welcome, ${data.name}!`, false);
          setBtnLoading('reg-btn-text', 'reg-spin', false, 'Create Account →');
          setTimeout(() => window.location.href = '/menu', 900);
        } else {
          showBanner('reg-error', data.error || 'Registration failed. Please try again.', true);
          btn.disabled = false;
          setBtnLoading('reg-btn-text', 'reg-spin', false, 'Create Account →');
        }
      } catch (e) {
        showBanner('reg-error', 'Connection error. Please try again.', true);
        btn.disabled = false;
        setBtnLoading('reg-btn-text', 'reg-spin', false, 'Create Account →');
      }
    }

    async function doGuest() {
      const btn = document.getElementById('guest-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      try {
        const res = await fetch('/api/guest', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' }
        });
        if (res.ok) {
          window.location.href = '/menu';
        } else {
          btn.disabled = false;
          btn.innerHTML = '🚀 Continue as Guest';
          alert('Unable to access guest mode. Please try again.');
        }
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '🚀 Continue as Guest';
        alert('Connection error. Please try again.');
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // KEYBOARD SUPPORT
    // ═══════════════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('login-form').classList.contains('active')) {
        if (!document.getElementById('login-btn').disabled) doLogin();
      } else {
        if (!document.getElementById('reg-btn').disabled) doRegister();
      }
    });
  </script>
</body>

</html>
