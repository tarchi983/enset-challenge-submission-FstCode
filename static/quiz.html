<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz — Darija AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#0a0a0f; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
    .bg { position:fixed; inset:0; background:radial-gradient(ellipse at 50% 30%,#c1440e12 0%,transparent 60%); }

    header { width:100%; padding:16px 28px; background:#111118; border-bottom:1px solid #1e1e2a; display:flex; align-items:center; gap:12px; position:relative; z-index:1; }
    .back-btn { padding:6px 14px; border:1px solid #333; border-radius:20px; color:#888; background:transparent; cursor:pointer; font-size:0.8rem; text-decoration:none; transition:all 0.2s; }
    .back-btn:hover { border-color:#c1440e; color:#c1440e; }
    .header-title { font-size:1rem; font-weight:600; }
    .header-title span { color:#c1440e; }

    .quiz-wrap { position:relative; z-index:1; width:100%; max-width:600px; padding:50px 20px; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }

    .score-bar { display:flex; justify-content:space-between; width:100%; margin-bottom:30px; color:#666; font-size:0.85rem; }
    .score-bar span { color:#c1440e; font-weight:700; font-size:1rem; }

    .question-card { width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:20px; padding:36px; margin-bottom:24px; }
    .q-num { font-size:0.75rem; color:#555; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
    .q-text { font-size:1.1rem; font-weight:600; line-height:1.5; }

    .options { width:100%; display:flex; flex-direction:column; gap:12px; }
    .option-btn {
      width:100%; padding:14px 20px; text-align:left;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
      border-radius:12px; color:#ccc; font-family:'Poppins',sans-serif;
      font-size:0.92rem; cursor:pointer; transition:all 0.2s;
    }
    .option-btn:hover:not(:disabled) { border-color:#c1440e; color:#fff; background:rgba(193,68,14,0.1); }
    .option-btn.correct { border-color:#2ecc71; background:rgba(46,204,113,0.1); color:#2ecc71; }
    .option-btn.wrong   { border-color:#e74c3c; background:rgba(231,76,60,0.1);  color:#e74c3c; }

    .feedback { text-align:center; padding:16px; border-radius:12px; margin-top:16px; font-weight:600; display:none; }
    .feedback.correct { background:rgba(46,204,113,0.1); color:#2ecc71; }
    .feedback.wrong   { background:rgba(231,76,60,0.1);  color:#e74c3c; }

    .next-btn { margin-top:20px; padding:13px 36px; background:#c1440e; color:#fff; border:none; border-radius:28px; font-family:'Poppins',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.2s; display:none; }
    .next-btn:hover { background:#a83a0c; }

    .loading { text-align:center; color:#555; padding:60px; }
    .loading .spin { font-size:2.5rem; animation:spin 1s linear infinite; display:block; margin-bottom:16px; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .topics { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:30px; }
    .topic-btn { padding:7px 16px; background:#16161f; border:1px solid #2a2a3a; border-radius:20px; color:#aaa; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
    .topic-btn:hover, .topic-btn.active { border-color:#c1440e; color:#c1440e; }

    .final-score { text-align:center; padding:40px 20px; }
    .final-score-icon { font-size:4rem; margin-bottom:20px; }
    .final-score-text { font-size:2.5rem; font-weight:700; color:#c1440e; margin-bottom:10px; }
    .final-score-label { font-size:1rem; color:#aaa; margin-bottom:30px; }
    .restart-btn { padding:14px 40px; background:#c1440e; color:#fff; border:none; border-radius:28px; font-family:'Poppins',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:20px; }
    .restart-btn:hover { background:#a83a0c; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <header>
    <a href="/menu" class="back-btn">← Menu</a>
    <div class="header-title">🧠 Darija <span>Quiz</span></div>
  </header>

  <div class="quiz-wrap">
    <div class="score-bar">
      <div>Question <span id="q-num">1</span></div>
      <div>Score: <span id="score">0</span></div>
    </div>

    <div style="width:100%; margin-bottom:20px;">
      <p style="font-size:0.82rem; color:#555; margin-bottom:10px;">Pick a topic:</p>
      <div class="topics">
        <button class="topic-btn active" onclick="setTopic(this,'general Darija expressions')">General</button>
        <button class="topic-btn" onclick="setTopic(this,'Darija greetings')">Greetings</button>
        <button class="topic-btn" onclick="setTopic(this,'Moroccan food vocabulary')">Food</button>
        <button class="topic-btn" onclick="setTopic(this,'Darija numbers')">Numbers</button>
        <button class="topic-btn" onclick="setTopic(this,'Moroccan cultural customs')">Culture</button>
      </div>
    </div>

    <div id="quiz-content" style="width:100%;">
      <div class="loading"><span class="spin">⏳</span>Loading your first question...</div>
    </div>
  </div>

  <script>
    // Per-topic state: each topic keeps its own score and question counter
    const topicScores = {};
    const topicQNums  = {};
    let currentTopic  = 'general Darija expressions';
    let correctAnswer = '';

    // Helper: get or initialise state for the current topic
    function getScore()  { return topicScores[currentTopic] || 0; }
    function getQNum()   { return topicQNums[currentTopic]  || 1; }
    function setScore(v) { topicScores[currentTopic] = v; }
    function setQNum(v)  { topicQNums[currentTopic]  = v; }

    // Refresh the top score-bar with current topic values
    function refreshBar() {
      document.getElementById('score').textContent = getScore();
      document.getElementById('q-num').textContent = getQNum();
    }

    function setTopic(btn, topic) {
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTopic = topic;
      // Don't carry over question number — each topic starts from Q1
      if (!topicQNums[currentTopic]) topicQNums[currentTopic] = 1;
      refreshBar();
      loadQuestion();
    }

    async function loadQuestion() {
      document.getElementById('quiz-content').innerHTML = '<div class="loading"><span class="spin">⏳</span>Generating question...</div>';
      try {
        const res = await fetch('/api/quiz', {
          method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({topic: currentTopic})
        });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        renderQuestion(data);
      } catch(e) { showError('Could not load question.'); }
    }

    function renderQuestion(data) {
      // Normalize the correct answer to a single uppercase letter
      correctAnswer = (data.answer || '').toString().trim().toUpperCase().charAt(0);
      refreshBar();
      document.getElementById('quiz-content').innerHTML = `
        <div class="question-card">
          <div class="q-num">Question ${getQNum()}</div>
          <div class="q-text">${data.question}</div>
        </div>
        <div class="options">
          ${data.options.map((o, i) => {
            // Extract option letter from text (e.g. "A) Salam" → "A")
            // Fall back to position index if not present
            const match = o.match(/^([A-Da-d])[).\s]/);
            const letter = match ? match[1].toUpperCase() : String.fromCharCode(65 + i);
            return `<button class="option-btn" onclick="checkAnswer(this,'${letter}')">${o}</button>`;
          }).join('')}
        </div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
      `;
    }

    function checkAnswer(btn, letter) {
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      const fb = document.getElementById('feedback');

      if (letter === correctAnswer) {
        btn.classList.add('correct');
        fb.textContent = '✅ Correct! Mzyan bezzaf! (Very good!)';
        fb.className = 'feedback correct';
        setScore(getScore() + 1);
        document.getElementById('score').textContent = getScore();
      } else {
        btn.classList.add('wrong');
        fb.textContent = `❌ Not quite. The correct answer was ${correctAnswer}.`;
        fb.className = 'feedback wrong';
        // Highlight the correct option button
        document.querySelectorAll('.option-btn').forEach(b => {
          const m = b.textContent.trim().match(/^([A-Da-d])[).\s]/);
          const btnLetter = m ? m[1].toUpperCase() : '';
          if (btnLetter === correctAnswer) b.classList.add('correct');
        });
      }
      fb.style.display = 'block';
      document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
      setQNum(getQNum() + 1);
      if (getQNum() > 7) {
        showFinalScore();
      } else {
        loadQuestion();
      }
    }

    function showFinalScore() {
      const finalScore = getScore();
      document.getElementById('quiz-content').innerHTML = `
        <div class="final-score">
          <div class="final-score-icon">🎉</div>
          <div class="final-score-text">${finalScore}/7</div>
          <div class="final-score-label">Quiz Complete! (${currentTopic})</div>
          <button class="restart-btn" onclick="restartTopic()">Try Again</button>
        </div>
      `;
      document.getElementById('q-num').textContent = finalScore;
    }

    function restartTopic() {
      // Reset only the current topic's state, leave others intact
      topicScores[currentTopic] = 0;
      topicQNums[currentTopic]  = 1;
      refreshBar();
      loadQuestion();
    }

    function showError(msg) { document.getElementById('quiz-content').innerHTML = `<p style="color:#e74c3c;text-align:center">${msg}</p>`; }

    // Auth check & initial load
    fetch('/api/me',{credentials:'include'}).then(r=>r.json()).then(d=>{ if(d.error) window.location.href='/login'; });
    topicQNums[currentTopic] = 1;
    refreshBar();
    loadQuestion();
  </script>
</body>
</html>
