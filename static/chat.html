
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — Darija AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#0a0a0f; color:#fff; height:100vh; display:flex; }

    #sidebar {
      width:280px; background:#111118; border-right:1px solid #1e1e2a;
      display:flex; flex-direction:column; transition:transform 0.3s ease;
      overflow-y:auto;
    }
    #sidebar.hidden { transform:translateX(-100%); position:absolute; width:100%; }

    .sidebar-header {
      padding:16px; border-bottom:1px solid #1e1e2a;
      display:flex; justify-content:space-between; align-items:center;
    }
    .sidebar-title { font-size:0.9rem; font-weight:700; color:#c1440e; }
    .close-sidebar { background:none; border:none; color:#666; cursor:pointer; font-size:1.2rem; }
    .close-sidebar:hover { color:#fff; }

    .history-list {
      flex:1; overflow-y:auto; padding:8px;
    }
    .history-item {
      padding:12px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05);
      border-radius:8px; margin-bottom:8px; cursor:pointer;
      transition:all 0.2s; font-size:0.85rem; color:#aaa;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .history-item:hover { background:rgba(193,68,14,0.1); border-color:rgba(193,68,14,0.3); color:#c1440e; }
    .history-item.active { background:rgba(193,68,14,0.15); border-color:#c1440e; color:#fff; }
    .history-time { font-size:0.7rem; color:#555; display:block; margin-top:4px; }

    .sidebar-footer {
      padding:12px; border-top:1px solid #1e1e2a;
      display:flex; gap:8px;
    }
    .new-chat-btn {
      flex:1; padding:10px; background:#c1440e; color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-weight:600;
      font-size:0.85rem; transition:all 0.2s;
    }
    .new-chat-btn:hover { background:#a83a0c; }
    .delete-history-btn {
      padding:10px 14px; background:rgba(255,107,107,0.15); color:#ff6b6b;
      border:1px solid rgba(255,107,107,0.3); border-radius:8px;
      cursor:pointer; font-weight:600; font-size:1.1rem;
      transition:all 0.2s;
    }
    .delete-history-btn:hover { background:rgba(255,107,107,0.25); border-color:#ff6b6b; }

    .main-chat { flex:1; display:flex; flex-direction:column; }

    header {
      padding:14px 28px; background:#111118;
      border-bottom:1px solid #1e1e2a;
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .history-toggle {
      padding:6px 14px; border:1px solid #333; border-radius:20px;
      color:#888; background:transparent; cursor:pointer; font-size:0.8rem;
      text-decoration:none; transition:all 0.2s;
    }
    .history-toggle:hover { border-color:#c1440e; color:#c1440e; }
    .back-btn {
      padding:6px 14px; border:1px solid #333; border-radius:20px;
      color:#888; background:transparent; cursor:pointer; font-size:0.8rem;
      text-decoration:none; transition:all 0.2s;
    }
    .back-btn:hover { border-color:#c1440e; color:#c1440e; }
    .header-title { font-size:1rem; font-weight:600; }
    .header-title span { color:#c1440e; }
    .end-btn {
      padding:8px 20px; background:transparent;
      border:1px solid #c1440e; border-radius:20px;
      color:#c1440e; cursor:pointer; font-size:0.82rem;
      font-family:'Poppins',sans-serif; transition:all 0.2s;
    }
    .end-btn:hover { background:#c1440e; color:#fff; }

    #chat-box { flex:1; overflow-y:auto; padding:24px 16px; display:flex; flex-direction:column; gap:16px; max-width:100%; }

    .msg { display:flex; flex-direction:column; max-width:78%; animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self:flex-end; align-items:flex-end; }
    .msg.bot  { align-self:flex-start; align-items:flex-start; }
    .msg-label { font-size:0.7rem; color:#555; margin-bottom:4px; padding:0 4px; }
    .bubble { padding:12px 16px; border-radius:18px; line-height:1.65; font-size:0.92rem; white-space:pre-wrap; word-break:break-word; }
    .msg.user .bubble { background:#c1440e; color:#fff; border-bottom-right-radius:4px; }
    .msg.bot  .bubble { background:#16161f; color:#e0e0e0; border-bottom-left-radius:4px; border:1px solid #1e1e2a; }

    .typing { display:flex; align-items:center; gap:5px; padding:14px 16px; background:#16161f; border-radius:18px; border-bottom-left-radius:4px; border:1px solid #1e1e2a; width:fit-content; }
    .dot { width:8px; height:8px; background:#c1440e; border-radius:50%; animation:bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

    #input-row { padding:16px; border-top:1px solid #1e1e2a; display:flex; gap:10px; }
    #msg-input { flex:1; padding:13px 18px; border-radius:28px; border:1px solid #2a2a3a; background:#16161f; color:#fff; font-family:'Poppins',sans-serif; font-size:0.92rem; outline:none; transition:border 0.2s; }
    #msg-input:focus { border-color:#c1440e; }
    #msg-input::placeholder { color:#444; }
    #send-btn { padding:13px 26px; background:#c1440e; color:#fff; border:none; border-radius:28px; font-family:'Poppins',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; transition:background 0.2s; }
    #send-btn:hover { background:#a83a0c; }
    #send-btn:disabled { background:#444; cursor:not-allowed; }

    .suggestions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .chip { padding:7px 14px; background:#16161f; border:1px solid #2a2a3a; border-radius:20px; color:#aaa; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
    .chip:hover { border-color:#c1440e; color:#c1440e; }

    .welcome-msg { text-align:center; padding:40px 20px; color:#444; }
    .welcome-msg .big { font-size:2.5rem; margin-bottom:12px; }
    .welcome-msg h2 { color:#777; font-weight:500; margin-bottom:6px; }

    @media (max-width:768px) {
      #sidebar { position:fixed; left:0; top:0; height:100%; z-index:100; }
      #sidebar.hidden { display:none; }
    }
  </style>
</head>
<body>
  <!-- History Sidebar -->
  <div id="sidebar" class="hidden">
    <div class="sidebar-header">
      <span class="sidebar-title">📚 Chat History</span>
      <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="sidebar-footer">
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
      <button class="delete-history-btn" onclick="deleteAllHistory()" title="Delete all history">🗑️</button>
    </div>
  </div>

  <div class="main-chat">
    <header>
      <div class="header-left">
        <button class="history-toggle" onclick="toggleSidebar()">📚 History</button>
        <a href="/menu" class="back-btn">← Menu</a>
        <div class="header-title">🇲🇦 Darija <span>Chat</span></div>
      </div>
      <button class="end-btn" onclick="endSession()">End & Get Summary</button>
    </header>

    <div id="chat-box">
      <div class="welcome-msg" id="welcome">
        <div class="big">🗣️</div>
        <h2>Merhba! Ask me anything about Morocco or Darija.</h2>
        <p>Try one of these to start:</p>
        <div class="suggestions" style="justify-content:center; margin-top:16px;">
          <span class="chip" onclick="send('How do Moroccans greet each other?')">How do Moroccans greet each other?</span>
          <span class="chip" onclick="send('What does labas mean?')">What does labas mean?</span>
          <span class="chip" onclick="send('How to order food in Morocco?')">How to order food in Morocco?</span>
          <span class="chip" onclick="send('Teach me Moroccan numbers')">Teach me Moroccan numbers</span>
        </div>
      </div>
    </div>

    <div id="input-row">
      <input type="text" id="msg-input" placeholder="Ask about Morocco or Darija..." autocomplete="off"/>
      <button id="send-btn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('msg-input');
    const btn     = document.getElementById('send-btn');
    const sidebar = document.getElementById('sidebar');
    const historyList = document.getElementById('history-list');
    
    let history   = [];
    let currentChatId = null;
    let conversations = {};

    // Load conversations from localStorage
    function loadConversations() {
      const saved = localStorage.getItem('darija_conversations');
      conversations = saved ? JSON.parse(saved) : {};
      renderHistory();
    }

    // Save current conversation to localStorage
    function saveConversation() {
      if (!currentChatId) {
        currentChatId = 'chat_' + Date.now();
      }
      const firstMsg = history[0] ? history[0].substring(0, 40) : 'Chat';
      conversations[currentChatId] = {
        id: currentChatId,
        title: firstMsg,
        timestamp: new Date().toLocaleString(),
        messages: [...history]
      };
      localStorage.setItem('darija_conversations', JSON.stringify(conversations));
      renderHistory();
    }

    // Render history list in sidebar
    function renderHistory() {
      historyList.innerHTML = '';
      if (Object.keys(conversations).length === 0) {
        historyList.innerHTML = '<div style="padding:16px; color:#555; font-size:0.8rem;">No conversations yet. Start chatting!</div>';
        return;
      }
      Object.values(conversations)
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(conv => {
          const item = document.createElement('div');
          item.className = 'history-item' + (currentChatId === conv.id ? ' active' : '');
          item.innerHTML = `<div>${conv.title}...</div><span class="history-time">${conv.timestamp}</span>`;
          item.onclick = () => loadConversation(conv.id);
          historyList.appendChild(item);
        });
    }

    // Load a conversation
    function loadConversation(chatId) {
      const conv = conversations[chatId];
      if (!conv) return;
      
      currentChatId = chatId;
      history = [...conv.messages];
      
      // Clear chat box
      chatBox.innerHTML = '';
      
      // Render all messages
      conv.messages.forEach(msg => {
        if (msg.startsWith('You:')) {
          addMsg('user', msg.substring(5).trim());
        } else if (msg.startsWith('Expert:')) {
          addMsg('bot', msg.substring(8).trim());
        }
      });
      
      toggleSidebar(); // Close sidebar after selecting
      renderHistory();
    }

    // New chat
    function newChat() {
      if (history.length > 0) saveConversation();
      history = [];
      currentChatId = null;
      chatBox.innerHTML = `
        <div class="welcome-msg" id="welcome">
          <div class="big">🗣️</div>
          <h2>Merhba! Ask me anything about Morocco or Darija.</h2>
          <p>Try one of these to start:</p>
          <div class="suggestions" style="justify-content:center; margin-top:16px;">
            <span class="chip" onclick="send('How do Moroccans greet each other?')">How do Moroccans greet each other?</span>
            <span class="chip" onclick="send('What does labas mean?')">What does labas mean?</span>
            <span class="chip" onclick="send('How to order food in Morocco?')">How to order food in Morocco?</span>
            <span class="chip" onclick="send('Teach me Moroccan numbers')">Teach me Moroccan numbers</span>
          </div>
        </div>
      `;
      input.focus();
      renderHistory();
    }

    // Delete all history
    function deleteAllHistory() {
      if (!confirm('Are you sure? This will delete ALL conversations.')) return;
      conversations = {};
      localStorage.removeItem('darija_conversations');
      currentChatId = null;
      history = [];
      newChat();
      renderHistory();
    }

    // Toggle sidebar
    function toggleSidebar() {
      sidebar.classList.toggle('hidden');
    }

    input.addEventListener('keydown', e => { if(e.key==='Enter') send(); });

    function addMsg(role, text) {
      document.getElementById('welcome')?.remove();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = role==='user' ? 'You' : '🇲🇦 Darija Expert';
      const bub = document.createElement('div');
      bub.className = 'bubble';
      bub.textContent = text;
      wrap.append(lbl, bub);
      chatBox.appendChild(wrap);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const w = document.createElement('div');
      w.className = 'msg bot'; w.id = 'typing';
      const l = document.createElement('div');
      l.className='msg-label'; l.textContent='🇲🇦 Darija Expert';
      const t = document.createElement('div');
      t.className='typing';
      t.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      w.append(l,t); chatBox.appendChild(w);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() { document.getElementById('typing')?.remove(); }

    async function send(preset) {
      const msg = preset || input.value.trim();
      if (!msg) return;
      input.value = '';
      btn.disabled = true; input.disabled = true;
      addMsg('user', msg);
      showTyping();
      history.push(`You: ${msg}`);
      saveConversation();

      try {
        const res = await fetch('/api/chat', {
          method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        removeTyping();
        const reply = data.error ? '⚠️ ' + data.error : data.response;
        addMsg('bot', reply);
        history.push(`Expert: ${reply}`);
        saveConversation();
      } catch {
        removeTyping();
        addMsg('bot','⚠️ Server error. Please try again.');
      }
      btn.disabled = false; input.disabled = false; input.focus();
    }

    function endSession() {
      if (history.length === 0) { alert('Start a conversation first!'); return; }
      saveConversation();
      sessionStorage.setItem('chatHistory', history.join('\n'));
      window.location.href = '/summary';
    }

    // Init
    loadConversations();
    fetch('/api/me', {credentials:'include'})
      .then(r=>r.json())
      .then(d=>{ if(d.error) window.location.href='/login'; });
  </script>
</body>
</html>
